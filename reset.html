<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F172A" />
    <title>TNB – Reset Password</title>
    <link rel="manifest" href="manifest.json" />
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#2563EB',
              secondary: '#7C3AED',
              success: '#10B981',
              danger: '#EF4444',
              dark: '#0F172A',
              surface: '#1E293B'
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif']
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="reset-style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="dark-mode">

    <!-- Animated background orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="glass-container">
      <nav class="top-nav sticky top-0 z-50 backdrop-blur-md bg-white/10 dark:bg-black/20 border-b border-white/10 transition-all duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
          <button onclick="location.href = 'index.html'" class="sub-btn text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-primary transition-colors">
            <i class="fas fa-chevron-left mr-1"></i> Back
          </button>
          <div class="flex items-center gap-2">
            <button id="lang-btn" class="sub-btn text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-primary transition-colors">
              <i class="fas fa-language mr-1"></i> Burmese
            </button>
            <button id="theme-btn" class="sub-btn text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-primary transition-colors">🌙 Dark</button>
          </div>
        </div>
      </nav>

      <!-- Brand Mark -->
      <div class="brand-mark text-center py-6">
        <div class="brand-icon mx-auto mb-3" aria-hidden="true">
          <i class="fas fa-key text-3xl text-white"></i>
        </div>
        <span class="brand-name text-3xl font-bold bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent">TNB</span>
        <p class="text-sm text-gray-400 mt-2">Financial Management</p>
      </div>

      <header class="text-center mb-8">
        <h1 id="title" class="text-3xl font-bold text-white mb-2">Reset Password</h1>
        <p class="page-sub text-gray-400 text-sm">We'll send you a recovery code</p>
      </header>

      <!-- Note Box -->
      <div class="note-box bg-blue-500/10 border border-blue-500/20 rounded-xl p-4 mb-6 flex items-start gap-3">
        <i class="fas fa-envelope text-blue-500 text-lg mt-0.5" aria-hidden="true"></i>
        <p id="note-text" class="text-sm text-gray-300 leading-relaxed">
          Enter your registered Gmail to receive an OTP code for password
          recovery.
        </p>
      </div>

      <!-- Email + Send OTP -->
      <div class="space-y-4">
        <div class="input-group relative">
          <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-envelope"></i></span>
          <input
            type="email"
            id="reset-email"
            placeholder="Enter your Gmail"
            required
            class="w-full pl-12 pr-4 py-3 rounded-lg bg-white/5 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          />
        </div>
        <button id="send-otp-btn" class="main-btn w-full py-3 px-6 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold shadow-lg hover:shadow-blue-500/50 transform hover:scale-[1.02] transition-all duration-200 flex items-center justify-center gap-2">
          <i class="fas fa-paper-plane" aria-hidden="true"></i>
          <span class="btn-text">Send OTP</span>
          <span class="btn-loader hidden" aria-hidden="true"><i class="fas fa-circle-notch fa-spin"></i></span>
        </button>
      </div>

      <!-- OTP Modal -->
      <div id="otp-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity duration-300 opacity-0 pointer-events-none">
        <div class="modal-content bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl max-w-md w-full p-6">

          <div class="modal-header text-center mb-6">
            <div class="modal-icon mx-auto mb-3 text-4xl text-green-400"><i class="fas fa-shield-check"></i></div>
            <h3 id="modal-title" class="text-2xl font-bold text-white mb-2">Verify OTP</h3>
            <p id="modal-desc" class="modal-sub-text text-gray-400 text-sm">Enter the code sent to your email</p>
          </div>

          <div class="modal-fields space-y-4">
            <div class="input-group relative">
              <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-hashtag"></i></span>
              <input type="text" id="otp-code" placeholder="OTP Code" required class="w-full pl-12 pr-4 py-3 rounded-lg bg-white/5 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
            </div>
            <div class="input-group relative">
              <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-lock"></i></span>
              <input type="password" id="new-password" placeholder="New Password" required class="w-full pl-12 pr-4 py-3 rounded-lg bg-white/5 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
            </div>
            <div class="input-group relative">
              <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-lock"></i></span>
              <input type="password" id="confirm-new-password" placeholder="Confirm Password" required class="w-full pl-12 pr-4 py-3 rounded-lg bg-white/5 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
            </div>
          </div>

          <div class="modal-btns mt-6 flex gap-3">
            <button id="verify-btn" class="main-btn flex-1 py-3 px-6 rounded-lg bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold shadow-lg hover:shadow-green-500/50 transform hover:scale-[1.02] transition-all duration-200 flex items-center justify-center gap-2">
              <i class="fas fa-check-circle" aria-hidden="true"></i>
              <span class="btn-text">Update &amp; Login</span>
              <span class="btn-loader hidden" aria-hidden="true"><i class="fas fa-circle-notch fa-spin"></i></span>
            </button>
            <button id="close-modal" class="sub-btn flex-1 py-3 px-6 rounded-lg bg-gray-700 text-gray-200 font-medium hover:bg-gray-600 transition-colors">
              <i class="fas fa-times" aria-hidden="true"></i> Cancel
            </button>
          </div>

        </div>
      </div>

    </div>

    <script src="reset-script.js"></script>
    <script>
      // Loading state helpers (UI only — no auth logic)
      function setLoading(btnId, loading) {
        const btn    = document.getElementById(btnId);
        if (!btn) return;
        const text   = btn.querySelector('.btn-text');
        const loader = btn.querySelector('.btn-loader');
        if (text)   text.style.display   = loading ? 'none'   : 'inline';
        if (loader) loader.style.display = loading ? 'inline' : 'none';
        btn.disabled = loading;
      }
      // Attach loading to send OTP button
      const sendBtn = document.getElementById('send-otp-btn');
      if (sendBtn) {
        const origClick = sendBtn.onclick;
        sendBtn.addEventListener('click', () => setLoading('send-otp-btn', true));
      }
      // Attach loading to verify button
      const verifyBtn = document.getElementById('verify-btn');
      if (verifyBtn) {
        verifyBtn.addEventListener('click', () => setLoading('verify-btn', true));
      }
    </script>
  </body>
</html>
