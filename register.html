<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="description" content="TNB Financial Management - Register Page" />
    <title>TNB – Register</title>
    <link rel="manifest" href="manifest.json" />
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#2563EB',
              secondary: '#7C3AED',
              success: '#10B981',
              danger: '#EF4444',
              dark: '#0F172A',
              surface: '#1E293B'
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif']
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="register-style.css" />
    <!-- Google Font: Plus Jakarta Sans (required by register-style.css) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="dark-mode">

    <!-- Animated background orbs -->
    <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

    <div class="glass-container">
      <nav class="top-nav sticky top-0 z-50 backdrop-blur-md bg-white/10 dark:bg-black/20 border-b border-white/10 transition-all duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
          <button onclick="location.href = 'index.html'" class="sub-btn text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-primary transition-colors">
            <i class="fas fa-arrow-left mr-1"></i> Login
          </button>
          <div class="flex items-center gap-2">
            <button id="lang-btn" class="sub-btn text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-primary transition-colors">
              <i class="fas fa-language mr-1"></i> Burmese
            </button>
            <button id="theme-btn" class="sub-btn text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-primary transition-colors">🌙 Dark</button>
          </div>
        </div>
      </nav>

      <!-- Note Box -->
      <div class="note-box bg-blue-500/10 border border-blue-500/20 rounded-xl p-4 mb-6 flex items-start gap-3">
        <i class="fas fa-circle-info text-blue-500 text-lg mt-0.5" aria-hidden="true"></i>
        <p id="note-text" class="text-sm text-gray-300 leading-relaxed">
          Welcome to the financial management software. Create your account to
          start tracking your assets.
        </p>
      </div>

      <!-- Brand + Title -->
      <div class="brand-mark text-center py-6">
        <div class="brand-icon mx-auto mb-3" aria-hidden="true">
          <i class="fas fa-chart-line text-3xl text-white"></i>
        </div>
        <span class="brand-name text-3xl font-bold bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent">TNB</span>
        <p class="text-sm text-gray-400 mt-2">Financial Management</p>
      </div>
      <header class="text-center mb-8">
        <h1 id="title" class="text-3xl font-bold text-white mb-2">Register</h1>
        <p class="page-sub text-gray-400 text-sm" id="page-sub">Create your free account</p>
      </header>

      <!-- Registration Form -->
      <form id="reg-form" class="space-y-4">
        <!-- Username -->
        <div class="input-group relative">
          <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-user" aria-hidden="true"></i></span>
          <input
            type="text"
            id="username"
            placeholder="UserName"
            required
            autocomplete="username"
            class="w-full pl-12 pr-4 py-3 rounded-lg bg-white/5 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          />
        </div>

        <!-- Password -->
        <div class="input-group relative">
          <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-lock" aria-hidden="true"></i></span>
          <input
            type="password"
            id="password"
            placeholder="Password (min 6 chars)"
            minlength="6"
            required
            autocomplete="new-password"
            class="w-full pl-12 pr-12 py-3 rounded-lg bg-white/5 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          />
          <button type="button" class="toggle-pass absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors" id="togglePass1" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="toggleIcon1" aria-hidden="true"></i>
          </button>
        </div>

        <!-- Confirm Password -->
        <div class="input-group relative">
          <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-lock" aria-hidden="true"></i></span>
          <input
            type="password"
            id="confirm-password"
            placeholder="Confirm Password"
            required
            autocomplete="new-password"
            class="w-full pl-12 pr-12 py-3 rounded-lg bg-white/5 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          />
          <button type="button" class="toggle-pass absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors" id="togglePass2" aria-label="Toggle confirm password visibility">
            <i class="fas fa-eye" id="toggleIcon2" aria-hidden="true"></i>
          </button>
        </div>

        <button type="submit" id="reg-btn" class="main-btn w-full py-3 px-6 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold shadow-lg hover:shadow-blue-500/50 transform hover:scale-[1.02] transition-all duration-200 flex items-center justify-center gap-2">
          <i class="fas fa-user-plus" aria-hidden="true"></i>
          <span class="btn-text">Register</span>
          <span class="btn-loader hidden" aria-hidden="true">
            <i class="fas fa-circle-notch fa-spin"></i>
          </span>
        </button>
      </form>

      <div class="separator flex items-center my-6">
        <div class="flex-1 h-px bg-gray-600"></div>
        <span id="separator-text" class="px-4 text-sm text-gray-400">Or continue with</span>
        <div class="flex-1 h-px bg-gray-600"></div>
      </div>

      <!-- Google Sign Up Button -->
      <button type="button" id="gmail-btn" class="social-btn relative w-full py-3 px-6 rounded-lg bg-white text-gray-800 font-medium border border-gray-200 hover:bg-gray-50 transition-colors overflow-hidden flex items-center justify-center gap-3" aria-label="Continue with Google">
        <svg
          class="google-icon"
          viewBox="0 0 48 48"
          width="20" height="20"
          aria-hidden="true"
        >
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>

        <span id="gmail-btn-text" class="text-gray-700">Continue with Google</span>

        <!-- Shimmer overlay (JS toggles display) -->
        <span id="gmail-shimmer" class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent bg-[length:200%_100%] animate-shimmer pointer-events-none" style="display: none;"></span>
      </button>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span id="gmail-btn-text">Continue with Google</span>
        <!-- Shimmer overlay — activated via JS while OAuth redirect loads -->
        <span id="gmail-shimmer" class="btn-shimmer" aria-hidden="true"></span>
      </button>

      <footer class="footer-links mt-6 text-center space-y-2">
        <p id="login-text" class="text-sm text-gray-400">
          Already have an account? <a href="index.html" class="text-blue-400 hover:text-blue-300 underline transition-colors">Login</a>
        </p>
        <p id="reset-text" class="text-sm text-gray-400">
          <a href="reset.html" class="text-blue-400 hover:text-blue-300 underline transition-colors">Forgot Password? Reset Password</a>
        </p>
      </footer>

    </div>

    <!-- All JS logic lives in register-script.js — no inline scripts needed -->
    <script src="register-script.js"></script>
  </body>
</html>
